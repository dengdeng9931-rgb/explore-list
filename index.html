<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的探索清单</title>
<style>
:root {
  --bg: #12100f;
  --bg-soft: #1a1715;
  --card: #201c1a;
  --card-border: #332d29;
  --text: #f3ece4;
  --text-dim: #a89c8f;
  --accent: #e8a04c;
  --accent-soft: rgba(232, 160, 76, 0.15);
  --teal: #5cb8a8;
  --teal-soft: rgba(92, 184, 168, 0.15);
  --pink: #e08a8a;
  font-size: 16px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at 15% -10%, #24201b 0%, var(--bg) 55%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 760px;
  padding: 22px 16px 50px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.topbar h1 {
  margin: 0;
  font-size: 21px;
}

.topbar .tagline {
  margin: 4px 0 0;
  font-size: 12.5px;
  color: var(--text-dim);
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--card-border);
  background: var(--bg-soft);
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.search-box input:focus { border-color: var(--accent); }

.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  margin: 2px 0 -4px 2px;
}

.chip {
  flex: 0 0 auto;
  padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--bg-soft);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.chip:hover { border-color: var(--accent); color: var(--text); }

.chip.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12.5px;
  color: var(--text-dim);
  padding: 2px 2px 0;
}

.fav-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}

.fav-toggle input { accent-color: var(--accent); }

.results-count { }

.list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: linear-gradient(160deg, var(--card) 0%, var(--bg-soft) 100%);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 16px 16px 14px;
}

.card-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.card-head h2 {
  margin: 0;
  font-size: 16.5px;
  line-height: 1.4;
  flex: 1;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 7px 0 0;
}

.tag {
  font-size: 10.5px;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  white-space: nowrap;
}

.tag.region { border-color: var(--teal); color: var(--teal); background: var(--teal-soft); }
.tag.visited { border-color: var(--accent); color: var(--accent); }
.tag.resource { border-color: var(--pink); color: var(--pink); }

.card-preview {
  margin: 10px 0 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-line;
}

.card-preview.collapsed {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.expand-btn {
  margin-top: 6px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 12.5px;
  cursor: pointer;
  padding: 0;
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.action-btn {
  flex: 1;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.action-btn:hover { border-color: var(--accent); color: var(--text); }

.action-btn.fav.active {
  border-color: var(--pink);
  color: var(--pink);
  background: rgba(224, 138, 138, 0.12);
}

.action-btn.saved {
  border-color: var(--teal);
  color: var(--teal);
}

.empty-state {
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  padding: 60px 20px;
}

.footnote {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.7;
  line-height: 1.6;
  padding: 6px 10px 0;
}
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>🧭 我的探索清单</h1>
      <p class="tagline">从 Obsidian 笔记整理 + 网络搜索扩充，搜索/筛选你收集的地点和事情</p>
    </header>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索城市、地点、关键词…">
    </div>

    <div>
      <div class="filter-label">大洲</div>
      <div class="filter-row" id="continent-filters">
        <button class="chip active" data-continent="all">全部</button>
      </div>
    </div>

    <div>
      <div class="filter-label">类型</div>
      <div class="filter-row" id="type-filters">
        <button class="chip active" data-type="all">全部</button>
      </div>
    </div>

    <div class="toolbar">
      <label class="fav-toggle">
        <input type="checkbox" id="fav-only">
        只看我收藏的
      </label>
      <span class="results-count" id="results-count"></span>
    </div>

    <main class="list" id="list"></main>

    <p class="footnote">
      内容整理自个人 Obsidian 笔记（含小红书原始截图信息）与网络公开资料补充；具体价格/时间/营业状态请以实地或官方最新信息为准。点击"收藏"存在本机浏览器；点击"存到 Obsidian"会打开 Obsidian App 存入"大脑存放站"库的"从探索清单收藏"文件夹（需已安装 Obsidian）。
    </p>
  </div>

<script>
const OBSIDIAN_VAULT = "大脑存放站";
const OBSIDIAN_FOLDER = "从探索清单收藏";

const PLACES = [

  {
    id: "sydney-jacaranda-spots",

    region: "悉尼NSW", continent: "大洋洲", types: ["景点"], visited: false,
    content: `每年10月下旬到11月初是悉尼蓝花楹（Jacaranda）盛开季，以下是实测好拍的9个点位：

1️⃣ Oxford St ⭐⭐⭐⭐⭐ 导航"theeca"直达，cafe门口有观景拍照位置，沿坡道下去一路好拍。

3️⃣ Town Hall ⭐⭐⭐ 门口两棵蓝花楹，旁边教堂门口的也好拍，花期后段花会凋谢较快，需抓紧。
4️⃣ First Fleet Park ⭐⭐⭐⭐ 靠近Circular Quay 6号码头，四五棵蓝花楹很茂密，位置绝佳，人多。
5️⃣ Cahill Expressway ⭐⭐⭐⭐ 从2号码头附近电梯上人行步道，可拍出经典地标合照，建议蹲低拍。
6️⃣ 皇家植物园 ⭐⭐⭐ 从步道走约2公里，麦考利夫人椅子方向有棵孤独的大蓝花楹，旁边小山坡可以和歌剧院同框；数量不多，时间紧可放弃。
7️⃣ Carabella St ⭐⭐⭐⭐⭐ Circular Quay坐渡轮F4到Kirribilli wharf下船即达，人少安静。
8️⃣ McDougall St ⭐⭐⭐⭐⭐ 从7️⃣步行可达，大草坪+最茂密的一棵蓝花楹可当背景。
9️⃣ Lavender St ⭐⭐⭐ 只有两棵，位置一般，顺路可拍（靠近很火的月神公园+歌剧院+海港大桥同框三件套）。`

    title: "Grafton 蓝花楹小镇",
    region: "悉尼NSW", continent: "大洋洲", types: ["景点"], visited: false,
    content: `Grafton位于新州北岸（离悉尼车程较远，适合安排单独行程或路上顺游），是澳洲最著名的蓝花楹小镇，每年10月中到11月初满城蓝紫色花海盛开，10月下旬通常是花开最盛的黄金时段，街道公园都被染成梦幻的紫色。当地每年会举办为期约10天的Jacaranda Festival，游行、花车、市集一应俱全，是澳洲历史最悠久的花卉节之一，当地人也很郑重其事地准备这个节日。花期很短，去之前建议先查好当年具体花期，提前订好住宿。`
  },
  {
    id: "waverley-cemetery",
    title: "Waverley Cemetery 海边悬崖公墓",
    region: "悉尼NSW", continent: "大洋洲", types: ["景点"], visited: false,
    content: `📍 St Thomas St & Trafalgar St, Bronte NSW 2024

建于1877年，坐落在Bronte海滩上方的悬崖顶，是Bondi to Coogee海岸步道的一段。白色卡拉拉大理石墓碑成排面朝太平洋，蓝天碧海的背景让这里成为悉尼最出片的墓园之一，完全免费开放（约9am-4/5pm）。墓园里长眠着诗人Henry Lawson、Dorothea Mackellar等澳洲名人。日暮海风时分气氛感很强，不赶时间的话可以顺着悬崖步道一路走到Bronte或Clovelly。`
  },
  {
    id: "dymocks-sydney",
    title: "Dymocks书店（悉尼CBD旗舰店）",
    region: "悉尼NSW", continent: "大洋洲", types: ["景点"], visited: false,
    content: `📍 424-430 George St, Sydney NSW 2000

三层楼的大型连锁书店：一楼主要卖文具礼品（贺卡、明信片、笔记本、布包、Jellycat玩偶等），也有些小说类书籍；二楼是主体书区，各类书加起来约51个种类分区，还有一个咖啡馆可以坐下喝咖啡看书（5点关门）；负一楼是儿童图书区，各种可爱童书和玩具。1879年创立，这栋Art Deco风格的Dymocks Building建于1930年代，本身就是悉尼市中心的历史地标之一，周末和朋友一起逛逛很不错。`

1830年代为殖民地官员Alexander Macleay建造的殖民地摄政时期风格豪宅，当年号称"全殖民地最美的房子"，现作为故居博物馆开放参观，可在官网免费预约。最大看点是中央椭圆形沙龙大厅、向上延伸的走廊和穹顶天窗下的螺旋楼梯，每间房间陈列都很精美，还有地下酒窖和花园。周日和周一对外开放，下午最晚开放到4点，从悉尼市区可乘坐311路公交到达，游客不多、很小众清静。`

    content: `🇫🇮 芬兰菜 Cafe Paci
🇰🇷 韩餐 Everyday SoPoong

    content: `细美寨的落日真的超绝，三天时间可以从容覆盖主景区+至少一个小众片区。丹霞山是"丹霞地貌"这一地质术语的命名地、世界自然遗产，园区分丹霞、韶石、巴寨、锦江画廊等几大片区。

路线推荐（仅下午）：两三四点去"水上丹霞"游船 →"阳元石"游览区进入 → 走"通泰桥"→"九九天梯"→"细美寨"（注意落日时间会随季节变化，需提前查询，这条路线相对阳元石那边上山去细美寨更好爬、风景更多、时间更短）。

路线推荐①（上午）：凌晨5-6点去"丹霞山索道"缆车上长老峰（具体日出时间可参考"丹霞山旅游"公众号）→ 前往"舵石"等待日出 → 日出后走"韶音亭"→"龙王泉"→"片鳞岩"→"虹桥拥翠"→"火烧岩"→"水帘岩"→"长老峰"（观日亭）→"双喜台"→"福音峡"→"摩崖石刻"，然后可选择去"别传寺"→"丹梯铁索"后返回"摩崖石刻"再下山，也可以直接下山。

路线推荐②（雨后或上午，沿江徒步、爬坡少）："群象出山"→"彩虹步道"→"博物馆"→"锦江沿岸"（博物馆右边有小路路牌写着"沿江休闲步道"），可以走到"翔龙湖"，体力好可继续逛翔龙湖、爬山上长老峰，不想爬可以等公交下山吃午饭。

补充：山不算特别高但阶梯多，建议穿舒适的鞋，索道可省体力，也可选择徒步登顶更有成就感；剩余一天可往人少的巴寨（丹霞山最高峰、未过度开发）方向徒步，避开人流看原生态丹霞地貌。`
  },

    content: `日本熊野古道办公室双朝圣证书认证流程实测：如果先走完熊野古道、再去西班牙走Camino，特地回熊野古道办公室咨询——工作人员回复，如果在西班牙已经注册认证了，在日本就不能再次注册认证；但双朝网站是通的，只能在一地注册，不能两边认证，可以直接沟通说不用认证，办理双朝证书即可，双向都是这样，领取证书和纪念品是可以的。证书办理点在熊野古道本宫大社公交站旁边的office center，办好证书后到本宫大社办公室，会有修行的人带你去敲鼓，敲好鼓再返回办公室领取金贝壳和其他纪念品。日本的双朝仪式流程严谨，会一步步引导，不会出现不知道下一步干什么的状况。

  {
    id: "yakun-set-a",
    title: "亚坤 Ya Kun A套餐（新加坡国民早餐）",
    region: "新加坡", continent: "亚洲", types: ["美食"], visited: true,
    content: `**A套餐内容**：四片小片吐司，涂上淡绿色椰浆咖椰酱（kaya jam）和厚厚一片黄油，配两颗半熟蛋，一杯热咖啡或茶。价格约6新币，非常实惠。

**为什么经典**：
• 烤吐司：外脆内软，带炭烤香气
• 咖椰酱：椰浆、鸡蛋、糖和班兰叶熬制，香甜带清香
• 黄油：切成厚片，冰凉黄油遇热吐司形成冷热对比
• 半熟蛋：加几滴酱油和胡椒，蛋黄流动，用来蘸吐司吃——甜咸鲜三种味道一口融合，是新加坡早餐文化里非常特别的吃法

**历史**：亚坤创始人Loi Ah Koon的妻子最早提出把吐司切成小片、搭配自制咖椰酱来卖，这个组合从此成为招牌，从1944年一个小摊子做到如今遍布全岛，配方几乎没变过。经典的原因很简单——极度简单，但每个元素都精准。`
  },

    content: `🚴 环岛骑行 3天约180公里：

    content: `法国传统正餐以复杂精致、多道菜闻名，典型法式大餐通常包括十四道菜：
1. 开胃酒（Apéritif）— 香槟/苦艾酒/轻鸡尾酒，配橄榄腌肉小奶酪片
2. 开胃小点（Amuse-Bouche）— 小份创意菜式，展现厨师手艺
3. 头道冷前菜（Entrée Froide）— 沙拉/腌制鱼片/鹅肝酱，经典如鞑靼牛排、烟熏三文鱼
4. 头道热前菜（Entrée Chaude）— 蜗牛/炸鹅肝/蘑菇奶油汤
5. 鱼料理（Poisson）— 龙虾/鲈鱼/三文鱼，搭配白葡萄酒
6. 主菜/肉料理（Plat Principal）— 牛排/鸭胸/羔羊肉，配红葡萄酒；法式炖牛肉、烤鸭胸是经典
7. 沙拉（Salade）— 清爽绿叶沙拉中和口味
8. 奶酪（Fromage）— 卡芒贝尔、布里、羊奶酪等，配面包
9. 果子露（Sorbet）— 柠檬或莓果口味，清口过渡
10. 甜点（Dessert）— 焦糖布丁、苹果塔、巧克力蛋糕
11. 小点心（Mignardises）— 马卡龙、杏仁饼干，配咖啡
12. 咖啡（Café）— 浓缩咖啡助消化
13. 消食酒（Digestif）— 白兰地/干邑/阿尔曼尼亚克
14. 结束（Fin）

其他经典法国美食：长棍面包（Baguette）、勃艮第红酒炖牛肉（Boeuf Bourguignon）、洋葱汤（Soupe à l'Oignon）、可丽饼（Crêpes）、鹅肝酱（Foie Gras）、普罗旺斯炖菜（Ratatouille）、马卡龙（Macaron）、葡萄酒（Vin，红酒配肉类、白葡萄酒配海鲜奶酪）。`

    content: `常被称为"圣雅各之路"，指前往西班牙西北部圣地亚哥-德孔波斯特拉大教堂的朝圣路线，据信圣雅各布（耶稣门徒之一）的遗骸安葬于此，历史可追溯至9世纪，是基督教世界三大朝圣目的地之一（另两个是罗马和耶路撒冷）。

**主要路线**：

• 葡萄牙之路（Camino Portugués，黄色）— 以美丽海滨风光和葡萄牙文化闻名，从里斯本走完全程约3.5周，只走波尔多段约10天，最后100公里通常从Tui开始

• 银之路（Via de la Plata）— 较少人知晓，从Seville出发
• 冬季之路（Camino de Invierno）— 从Chantada出发

沿途有专为朝圣者提供的宿舍（Albergue），价格低廉，朝圣者标志是贝壳（symbol of the scallop shell）。完成后可在圣地亚哥领取"朝圣者证书"，走路最少100km、骑行最少200km。另见：[[熊野古道×圣地亚哥朝圣之路「双朝圣认证」]]`
  },

  {

布达佩斯是匈牙利首都，也是该国政治、商业、运输、经济中心和最大城市，位于国境中北部、多瑙河中游两岸，早先是遥遥相对的两座城市，经几个世纪扩建，1873年由多瑙河右岸的布达、古布达和左岸的佩斯合并而成，此前一般称为佩斯-布达（Pest-Buda）。现为欧洲联盟第七大城市。`

const FAV_KEY = "explore-list-favs";
const SAVED_KEY = "explore-list-saved-to-ob";

const state = {
  search: "",
  continent: "all",
  type: "all",
  favOnly: false,
  favs: new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")),
  savedToOb: new Set(JSON.parse(localStorage.getItem(SAVED_KEY) || "[]")),
  expanded: new Set(),
};

const els = {
  search: document.getElementById("search-input"),
  continentFilters: document.getElementById("continent-filters"),
  typeFilters: document.getElementById("type-filters"),
  favOnly: document.getElementById("fav-only"),
  list: document.getElementById("list"),
  resultsCount: document.getElementById("results-count"),
};

function saveFavs() {
  localStorage.setItem(FAV_KEY, JSON.stringify([...state.favs]));
}
function saveSavedToOb() {
  localStorage.setItem(SAVED_KEY, JSON.stringify([...state.savedToOb]));
}

function buildFilterChips() {
  const continents = [...new Set(PLACES.map((p) => p.continent))];
  for (const c of continents) {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.continent = c;
    btn.textContent = c;
    els.continentFilters.appendChild(btn);
  }
  els.continentFilters.addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    state.continent = btn.dataset.continent;
    [...els.continentFilters.querySelectorAll(".chip")].forEach((c) =>
      c.classList.toggle("active", c === btn)
    );
    render();
  });

  const types = [...new Set(PLACES.flatMap((p) => p.types))];
  for (const t of types) {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.type = t;
    btn.textContent = t;
    els.typeFilters.appendChild(btn);
  }
  els.typeFilters.addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    state.type = btn.dataset.type;
    [...els.typeFilters.querySelectorAll(".chip")].forEach((c) =>
      c.classList.toggle("active", c === btn)
    );
    render();
  });
}

function getFiltered() {
  const q = state.search.trim().toLowerCase();
  return PLACES.filter((p) => {
    const matchContinent = state.continent === "all" || p.continent === state.continent;
    const matchType = state.type === "all" || p.types.includes(state.type);
    const matchFav = !state.favOnly || state.favs.has(p.id);
    const haystack = (p.title + " " + p.region + " " + p.content).toLowerCase();
    const matchSearch = !q || haystack.includes(q);
    return matchContinent && matchType && matchFav && matchSearch;
  });
}

function buildObsidianUri(place) {
  const lines = [
    `# ${place.title}`,
    "",
    `- 地区：${place.region}`,
    `- 类型：${place.types.join("、")}`,
    "",
    place.content,
    "",
    "> 收藏自「我的探索清单」网页",
  ];
  const content = lines.join("\n");
  const path = `${OBSIDIAN_FOLDER}/${place.title}`;
  return (
    "obsidian://new?vault=" +
    encodeURIComponent(OBSIDIAN_VAULT) +
    "&name=" +
    encodeURIComponent(path) +
    "&content=" +
    encodeURIComponent(content)
  );
}

function renderCard(place) {
  const isFav = state.favs.has(place.id);
  const isSaved = state.savedToOb.has(place.id);
  const isExpanded = state.expanded.has(place.id);
  const isLong = place.content.length > 140;

  const card = document.createElement("div");
  card.className = "card";

  const typeTags = place.types.map((t) => `<span class="tag">${t}</span>`).join("");

  card.innerHTML = `
    <div class="card-head">
      <h2>${place.title}</h2>
    </div>
    <div class="card-tags">
      <span class="tag region">📍 ${place.region}</span>
      ${typeTags}
      ${place.visited ? '<span class="tag visited">✓ 已去过</span>' : ""}
      ${place.isResource ? '<span class="tag resource">🧰 资源</span>' : ""}
    </div>
    <div class="card-preview ${isLong && !isExpanded ? "collapsed" : ""}" id="preview-${place.id}">${place.content}</div>
    ${isLong ? `<button class="expand-btn" id="expand-${place.id}">${isExpanded ? "收起 ▲" : "展开全文 ▼"}</button>` : ""}
    <div class="card-actions">
      <button class="action-btn fav ${isFav ? "active" : ""}" id="fav-${place.id}">
        ${isFav ? "💛 已收藏" : "🤍 收藏"}
      </button>
      <button class="action-btn ${isSaved ? "saved" : ""}" id="save-ob-${place.id}">
        ${isSaved ? "✓ 已存 Obsidian" : "📥 存到 Obsidian"}
      </button>
    </div>
  `;

  if (isLong) {
    card.querySelector(`#expand-${place.id}`).addEventListener("click", () => {
      if (state.expanded.has(place.id)) {
        state.expanded.delete(place.id);
      } else {
        state.expanded.add(place.id);
      }
      render();
    });
  }

  card.querySelector(`#fav-${place.id}`).addEventListener("click", () => {
    if (state.favs.has(place.id)) {
      state.favs.delete(place.id);
    } else {
      state.favs.add(place.id);
    }
    saveFavs();
    render();
  });

  card.querySelector(`#save-ob-${place.id}`).addEventListener("click", () => {
    window.location.href = buildObsidianUri(place);
    state.savedToOb.add(place.id);
    saveSavedToOb();
    render();
  });

  return card;
}

function render() {
  const filtered = getFiltered();
  els.resultsCount.textContent = `共 ${filtered.length} 个 · 已收藏 ${state.favs.size}`;
  els.list.innerHTML = "";
  if (filtered.length === 0) {
    els.list.innerHTML = `<div class="empty-state">没有找到匹配的地方，换个关键词或筛选条件试试</div>`;
    return;
  }
  for (const place of filtered) {
    els.list.appendChild(renderCard(place));
  }
}

let searchDebounce = null;
els.search.addEventListener("input", (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.search = e.target.value;
    render();
  }, 150);
});

els.favOnly.addEventListener("change", (e) => {
  state.favOnly = e.target.checked;
  render();
});

buildFilterChips();
render();
</script>
