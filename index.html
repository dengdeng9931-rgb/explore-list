<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的探索清单</title>
<style>
:root {
  --bg: #12100f;
  --bg-soft: #1a1715;
  --card: #201c1a;
  --card-border: #332d29;
  --text: #f3ece4;
  --text-dim: #a89c8f;
  --accent: #e8a04c;
  --accent-soft: rgba(232, 160, 76, 0.15);
  --teal: #5cb8a8;
  --teal-soft: rgba(92, 184, 168, 0.15);
  --pink: #e08a8a;
  font-size: 16px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at 15% -10%, #24201b 0%, var(--bg) 55%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 760px;
  padding: 22px 16px 50px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.topbar h1 {
  margin: 0;
  font-size: 21px;
}

.topbar .tagline {
  margin: 4px 0 0;
  font-size: 12.5px;
  color: var(--text-dim);
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--card-border);
  background: var(--bg-soft);
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.search-box input:focus { border-color: var(--accent); }

.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  margin: 2px 0 -4px 2px;
}

.chip {
  flex: 0 0 auto;
  padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--bg-soft);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.chip:hover { border-color: var(--accent); color: var(--text); }

.chip.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12.5px;
  color: var(--text-dim);
  padding: 2px 2px 0;
}

.fav-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}

.fav-toggle input { accent-color: var(--accent); }

.results-count { }

.list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: linear-gradient(160deg, var(--card) 0%, var(--bg-soft) 100%);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 16px 16px 14px;
}

.card-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.card-head h2 {
  margin: 0;
  font-size: 16.5px;
  line-height: 1.4;
  flex: 1;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 7px 0 0;
}

.tag {
  font-size: 10.5px;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  white-space: nowrap;
}

.tag.region { border-color: var(--teal); color: var(--teal); background: var(--teal-soft); }
.tag.visited { border-color: var(--accent); color: var(--accent); }
.tag.resource { border-color: var(--pink); color: var(--pink); }

.card-preview {
  margin: 10px 0 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-line;
}

.card-preview.collapsed {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.expand-btn {
  margin-top: 6px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 12.5px;
  cursor: pointer;
  padding: 0;
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.action-btn {
  flex: 1;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.action-btn:hover { border-color: var(--accent); color: var(--text); }

.action-btn.fav.active {
  border-color: var(--pink);
  color: var(--pink);
  background: rgba(224, 138, 138, 0.12);
}

.action-btn.saved {
  border-color: var(--teal);
  color: var(--teal);
}

.action-btn.checkin.active {
  border-color: #7cc4e8;
  color: #7cc4e8;
  background: rgba(124, 196, 232, 0.12);
}

.checked-in-badge {
  border-color: #7cc4e8 !important;
  color: #7cc4e8 !important;
}

.wiki-img {
  margin-top: 10px;
  border-radius: 12px;
  overflow: hidden;
  min-height: 110px;
  background: linear-gradient(100deg, var(--card-border) 30%, var(--bg-soft) 45%, var(--card-border) 60%);
  background-size: 400% 100%;
  animation: shimmer 1.4s ease infinite;
}

.wiki-img.loaded { min-height: 0; animation: none; background: none; }

@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: 0 0; }
}

.wiki-img img {
  display: block;
  width: 100%;
  max-height: 220px;
  object-fit: cover;
}

.wiki-img .img-caption {
  display: block;
  padding: 6px 2px 0;
  font-size: 10.5px;
  color: var(--text-dim);
  text-decoration: none;
}

.wiki-img .img-caption:hover { color: var(--accent); }

.discover-box {
  border: 1px dashed var(--card-border);
  border-radius: 14px;
  padding: 14px 16px;
  text-align: center;
}

.discover-box .discover-title {
  font-size: 13px;
  color: var(--text-dim);
  margin: 0 0 8px;
}

.discover-btn {
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #c97f2e);
  color: #241605;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.discover-result {
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  background: var(--bg-soft);
  font-size: 13.5px;
  line-height: 1.7;
  text-align: left;
  display: none;
}

.discover-result.show { display: block; }

.discover-result .discover-city {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}

.empty-state {
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  padding: 60px 20px;
}

.footnote {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.7;
  line-height: 1.6;
  padding: 6px 10px 0;
}
</style>
</head>

  <div class="app">
    <header class="topbar">
      <h1>🧭 我的探索清单</h1>

    <div>

    <div class="toolbar">
      <label class="fav-toggle">

        只看我收藏的

      <span class="results-count" id="results-count"></span>

    <div class="discover-box">

      <button class="discover-btn" id="discover-btn">🎲 发现一个新城市</button>
      <div class="discover-result" id="discover-result"></div>

    <main class="list" id="list"></main>

    <p class="footnote">

  </div>

    content: `日本熊野古道办公室双朝圣证书认证流程实测：如果先走完熊野古道、再去西班牙走Camino，特地回熊野古道办公室咨询——工作人员回复，如果在西班牙已经注册认证了，在日本就不能再次注册认证；但双朝网站是通的，只能在一地注册，不能两边认证，可以直接沟通说不用认证，办理双朝证书即可，双向都是这样，领取证书和纪念品是可以的。证书办理点在熊野古道本宫大社公交站旁边的office center，办好证书后到本宫大社办公室，会有修行的人带你去敲鼓，敲好鼓再返回办公室领取金贝壳和其他纪念品。日本的双朝仪式流程严谨，会一步步引导，不会出现不知道下一步干什么的状况。

    region: "新加坡", continent: "亚洲", types: ["美食"], visited: true,
    content: `**A套餐内容**：四片小片吐司，涂上淡绿色椰浆咖椰酱（kaya jam）和厚厚一片黄油，配两颗半熟蛋，一杯热咖啡或茶。价格约6新币，非常实惠。

**为什么经典**：
• 烤吐司：外脆内软，带炭烤香气
• 咖椰酱：椰浆、鸡蛋、糖和班兰叶熬制，香甜带清香
• 黄油：切成厚片，冰凉黄油遇热吐司形成冷热对比
• 半熟蛋：加几滴酱油和胡椒，蛋黄流动，用来蘸吐司吃——甜咸鲜三种味道一口融合，是新加坡早餐文化里非常特别的吃法

**历史**：亚坤创始人Loi Ah Koon的妻子最早提出把吐司切成小片、搭配自制咖椰酱来卖，这个组合从此成为招牌，从1944年一个小摊子做到如今遍布全岛，配方几乎没变过。经典的原因很简单——极度简单，但每个元素都精准。`

  // ------------------------- 韩国 -------------------------
  {
    id: "jeju-cycling",
    title: "济州岛环岛骑行3天 + 偶来小路",
    region: "韩国", continent: "亚洲", types: ["骑行", "徒步"], visited: false,
    content: `🚴 环岛骑行 3天约180公里：
D1 龙头岩(용두암)→松岳山(송악산) 80km，住山房山酒店，单车不可进房。刚出发到涯月以前市区路较烂窄，总体顺风，除了屁股痛没大问题，去山房山有段较长爬升。
D2 山房山酒店→表善海边(표선해변) 70km，住Sono Calm，单车可进房。进入西南线后大量逆风和爬升，大腿会很酸爽，下坡陡要注意安全，可能会遇到爆胎（备好补胎工具）。
D3 Sono→龙头岩出发点 90km，住口哨云雀。距离相对长但大量顺风和平缓路，会是舒服的一天。

骑行准备：一定要带头灯、行李防雨罩和雨衣；租车可选yongdamro96租车店（15000韩元/天，配头盔有行李架，公路车没行李架要背包骑）；济州岛风很大，防晒防雨防风、面罩都要备齐。

4个酒店实测：航空城卫生一般不隔音床硬；山房山推荐（装修新、床品舒适、免费洗衣烘干）；Sono很漂亮就在海边（斜对面CU可买早餐，走600m有家烤黑猪很好吃）；口哨云雀差评较多但实住感觉没什么问题，需押金，卫生不错床品舒适，出门就是海边步道。

🚶 济州岛Olle Paths 偶来小路：全岛约10段、总长约234公里的徒步小路和配套自行车道，沿黑色玄武岩海岸、火山锥、渔村和柑橘田展开，路况平缓标识清晰，秋天骑车最舒服，体力好可两天骑完全程，一般游客可挑1-2段体验。`
  },

  // ------------------------- 法国 -------------------------
  {
    id: "french-dining",
    title: "法式正餐十四道 + 经典法国美食",
    region: "法国", continent: "欧洲", types: ["美食"], visited: false,
    content: `法国传统正餐以复杂精致、多道菜闻名，典型法式大餐通常包括十四道菜：
1. 开胃酒（Apéritif）— 香槟/苦艾酒/轻鸡尾酒，配橄榄腌肉小奶酪片
2. 开胃小点（Amuse-Bouche）— 小份创意菜式，展现厨师手艺
3. 头道冷前菜（Entrée Froide）— 沙拉/腌制鱼片/鹅肝酱，经典如鞑靼牛排、烟熏三文鱼
4. 头道热前菜（Entrée Chaude）— 蜗牛/炸鹅肝/蘑菇奶油汤
5. 鱼料理（Poisson）— 龙虾/鲈鱼/三文鱼，搭配白葡萄酒
6. 主菜/肉料理（Plat Principal）— 牛排/鸭胸/羔羊肉，配红葡萄酒；法式炖牛肉、烤鸭胸是经典
7. 沙拉（Salade）— 清爽绿叶沙拉中和口味
8. 奶酪（Fromage）— 卡芒贝尔、布里、羊奶酪等，配面包
9. 果子露（Sorbet）— 柠檬或莓果口味，清口过渡
10. 甜点（Dessert）— 焦糖布丁、苹果塔、巧克力蛋糕
11. 小点心（Mignardises）— 马卡龙、杏仁饼干，配咖啡
12. 咖啡（Café）— 浓缩咖啡助消化
13. 消食酒（Digestif）— 白兰地/干邑/阿尔曼尼亚克
14. 结束（Fin）

其他经典法国美食：长棍面包（Baguette）、勃艮第红酒炖牛肉（Boeuf Bourguignon）、洋葱汤（Soupe à l'Oignon）、可丽饼（Crêpes）、鹅肝酱（Foie Gras）、普罗旺斯炖菜（Ratatouille）、马卡龙（Macaron）、葡萄酒（Vin，红酒配肉类、白葡萄酒配海鲜奶酪）。`
  },

  // ------------------------- 西班牙 -------------------------
  {
    id: "camino-de-santiago",
    title: "西班牙朝圣之路 Camino de Santiago",
    region: "西班牙", continent: "欧洲", types: ["徒步"], visited: false,
    content: `常被称为"圣雅各之路"，指前往西班牙西北部圣地亚哥-德孔波斯特拉大教堂的朝圣路线，据信圣雅各布（耶稣门徒之一）的遗骸安葬于此，历史可追溯至9世纪，是基督教世界三大朝圣目的地之一（另两个是罗马和耶路撒冷）。

**主要路线**：
• 法国之路（Camino Francés，黑色）— 最著名、被称为"国王之路"，从法国圣让-皮埃德波尔出发穿越比利牛斯山，全程约800公里，约1个月，约31.5%的朝圣者选择这条路线；最后100公里通常从Sarria小镇开始（约116公里/72英里）
• 原始之路（Camino Primitivo，红色）— 历史最悠久，起源9世纪，从奥维耶多出发穿过阿斯图里亚斯绿色山丘；最后100公里起点是Lugo
• 北方之路（Camino del Norte，蓝色）— 沿西班牙北部海岸线，更长更具挑战性
• Camino de Madrid（马德里路线）— 从马德里向西北延伸
• 葡萄牙之路（Camino Portugués，黄色）— 以美丽海滨风光和葡萄牙文化闻名，从里斯本走完全程约3.5周，只走波尔多段约10天，最后100公里通常从Tui开始
• 英国之路（Camino Inglés）— 从Ferrol出发，最后116公里/72英里
• 银之路（Via de la Plata）— 较少人知晓，从Seville出发
• 冬季之路（Camino de Invierno）— 从Chantada出发

沿途有专为朝圣者提供的宿舍（Albergue），价格低廉，朝圣者标志是贝壳（symbol of the scallop shell）。完成后可在圣地亚哥领取"朝圣者证书"，走路最少100km、骑行最少200km。另见：[[熊野古道×圣地亚哥朝圣之路「双朝圣认证」]]`
  },

  // ------------------------- 匈牙利 -------------------------
  {
    id: "budapest",
    title: "布达佩斯 匈牙利首都",
    region: "匈牙利", continent: "欧洲", types: ["景点"], visited: false,
    content: `相比很多欧洲城市，布达佩斯还算年轻。中世纪时布达勉强算城镇，佩斯还是半开化渔村，1241年二者同时被蒙古铁骑践踏。15世纪下半叶国王马提亚斯在布达城堡山建造文艺复兴风格皇宫，不久后被奥斯曼土耳其攻陷。约一个半世纪后哈布斯堡王朝军队重新解放布达时，人口不足一万三千人，佩斯勉强超过四千人。

布达佩斯是匈牙利首都，也是该国政治、商业、运输、经济中心和最大城市，位于国境中北部、多瑙河中游两岸，早先是遥遥相对的两座城市，经几个世纪扩建，1873年由多瑙河右岸的布达、古布达和左岸的佩斯合并而成，此前一般称为佩斯-布达（Pest-Buda）。现为欧洲联盟第七大城市。`

  { id: "seoul-bukchon", title: "北村韩屋村", region: "首尔", continent: "亚洲", types: ["景点"], visited: false,
    content: `传统韩屋建筑群，清晨人少时段最适合拍照，需注意这里也是居民生活区，请保持安静和礼貌。附近三清洞一带有很多独立咖啡馆。` },
  { id: "seoul-gwangjang", title: "广藏市场", region: "首尔", continent: "亚洲", types: ["美食"], visited: false,
    content: `绿豆煎饼、生拌牛肉、紫菜包饭等传统市场小吃聚集地，是首尔本地人也常去的老市场，适合几个摊位轮流试吃。` },
  { id: "seoul-ihwa", title: "梨花洞壁画村", region: "首尔", continent: "亚洲", types: ["景点"], visited: false,
    content: `山坡上的壁画街区，能俯瞰首尔城景，是很受欢迎的拍照点，但要注意这里也是居民生活区域，保持安静、不要打扰住户。` },
  { id: "seoul-hangang", title: "汉江公园野餐", region: "首尔", continent: "亚洲", types: ["景点"], visited: false,
    content: `本地人放松的日常去处，天气好的傍晚可以铺野餐垫、叫炸鸡啤酒送到江边，是体验首尔生活感的经典方式。` },
  { id: "seoul-mangwon", title: "望远洞市场", region: "首尔", continent: "亚洲", types: ["美食"], visited: false,
    content: `比广藏市场更本地化的传统市场，靠近弘大商圈，年轻人多，摊位价格也更亲民。` },
  { id: "seoul-buam", title: "付岩洞/西村", region: "首尔", continent: "亚洲", types: ["景点"], visited: false,
    content: `景福宫西侧的安静巷弄区域，比北村游客少很多，适合悠闲的City walk，沿途有不少小众独立书店和咖啡馆。` },
  { id: "seoul-bukhansan", title: "北汉山国家公园徒步", region: "首尔", continent: "亚洲", types: ["徒步"], visited: false,
    content: `首尔市内地铁就能到达的高山国家公园，适合安排半天徒步，秋季红叶季节尤其热门，山顶视野可以俯瞰整个首尔。` },

  // ------------------------- 巴厘岛/乌布 Bali/Ubud -------------------------
  { id: "bali-tegalalang", title: "Tegalalang 梯田", region: "巴厘岛", continent: "亚洲", types: ["景点"], visited: false,
    content: `乌布最经典的绿色梯田景观，清晨去光线最好、游客也最少，很多梯田边设有秋千和观景台（部分需付费）。` },
  { id: "bali-tirta-empul", title: "圣泉寺 Tirta Empul", region: "巴厘岛", continent: "亚洲", types: ["景点"], visited: false,
    content: `巴厘印度教的净化圣泉寺庙，可以体验当地人的净身仪式，需要租借传统纱笼、遵守当地宗教礼仪，是了解巴厘信仰文化很好的窗口。` },
  { id: "bali-ubud-market", title: "乌布传统市场 + 健康餐厅", region: "巴厘岛", continent: "亚洲", types: ["美食"], visited: false,
    content: `乌布是巴厘岛瑜伽和健康餐饮文化的中心，周边素食餐厅和果昔碗（smoothie bowl）选择很多，市场里也能淘到不少手工艺品。` },
  { id: "bali-ubud-palace", title: "乌布皇宫 + 传统舞蹈表演", region: "巴厘岛", continent: "亚洲", types: ["景点"], visited: false,
    content: `白天可以免费参观皇宫建筑，晚上皇宫及周边场地常有传统甘美兰音乐和巴龙舞（Barong Dance）表演，适合体验巴厘岛传统艺术。` },
  { id: "bali-jungle-swing", title: "丛林秋千 / 吊桥", region: "巴厘岛", continent: "亚洲", types: ["景点"], visited: false,
    content: `乌布周边热门的丛林秋千打卡点很多，建议挑选评价好、安全设施到位的运营商，价格和体验差异较大，可以提前查评价。` },
  { id: "bali-batur", title: "巴杜尔火山日出徒步", region: "巴厘岛", continent: "亚洲", types: ["徒步"], visited: false,
    content: `凌晨出发，摸黑爬到山顶等日出，需要一定体力和防寒衣物，建议请当地向导带队，山顶view非常值得早起。` },
  { id: "bali-monkey-forest", title: "圣猴森林公园", region: "巴厘岛", continent: "亚洲", types: ["景点"], visited: false,
    content: `乌布市区内的猴子保护区兼印度教寺庙遗迹，猴子比较活跃，要注意保管好眼镜、食物等随身物品以防被抢。` },

  // ------------------------- 台北 Taipei -------------------------
  { id: "taipei-night-market", title: "士林夜市 / 饶河街夜市", region: "台北", continent: "亚洲", types: ["美食"], visited: false,
    content: `台湾夜市文化的代表，蚵仔煎、大肠包小肠、生煎包等经典小吃都能吃到，建议肚子留够空间多试几样。` },
  { id: "taipei-maokong", title: "猫空缆车 + 茶馆", region: "台北", continent: "亚洲", types: ["景点"], visited: false,
    content: `缆车可以俯瞰台北盆地全景，山上茶馆聚集，铁观音等台湾茶配点心适合坐一下午，傍晚时段景色尤其好。` },
  { id: "taipei-jiufen", title: "九份老街", region: "台北", continent: "亚洲", types: ["景点"], visited: false,
    content: `山城老街+海景的组合，建议避开正午旅游团高峰时段，傍晚灯笼亮起后氛围最有味道，芋圆和茶室都值得一试。` },
  { id: "taipei-huashan", title: "中正纪念堂 + 华山1914文创园区", region: "台北", continent: "亚洲", types: ["景点"], visited: false,
    content: `历史建筑和文创园区的组合City walk，华山园区常有展览和市集活动，适合安排一个下午慢慢逛。` },
  { id: "taipei-yongkang", title: "永康街/东门牛肉面商圈", region: "台北", continent: "亚洲", types: ["美食"], visited: false,
    content: `台北牛肉面名店聚集地，附近还有很多甜品店和茶馆，适合吃完正餐再散步消食找甜点。` },
  { id: "taipei-xiangshan", title: "象山步道", region: "台北", continent: "亚洲", types: ["徒步"], visited: false,
    content: `市区内最方便的登山步道，难度不高、单程不到一小时，山顶正对101大楼，是拍台北夜景最经典的机位之一。` },
  { id: "taipei-beitou", title: "北投温泉", region: "台北", continent: "亚洲", types: ["景点"], visited: false,
    content: `市区内地铁就能到达的温泉区，地热谷+温泉博物馆可以安排半天，之后再找一家汤屋泡个温泉放松。` },

  // ------------------------- 巴黎 Paris -------------------------
  { id: "paris-marais", title: "玛黑区 Le Marais", region: "巴黎", continent: "欧洲", types: ["景点"], visited: false,
    content: `老城区+精品买手店+犹太熟食文化+同志友好氛围，比卢浮宫周边更有巴黎人的日常生活气息，适合悠闲逛一整个下午。` },
  { id: "paris-montmartre", title: "蒙马特高地 + 圣心大教堂", region: "巴黎", continent: "欧洲", types: ["景点"], visited: false,
    content: `爬上山顶可以俯瞰全巴黎，周边小巷子适合迷路式漫步，画家广场很有艺术氛围，人多的地方要注意保管好随身财物。` },
  { id: "paris-falafel", title: "玛黑区法拉费", region: "巴黎", continent: "欧洲", types: ["美食"], visited: false,
    content: `巴黎中东小吃的代表（如L'As du Fallafel一类老店），性价比高、出餐快，适合逛街逛累了快速解决一餐。` },
  { id: "paris-belleville", title: "贝尔维尔公园", region: "巴黎", continent: "欧洲", types: ["景点"], visited: false,
    content: `游客较少的观景公园，能看到埃菲尔铁塔和巴黎天际线，是本地人很喜欢的野餐地点，比战神广场清静很多。` },
  { id: "paris-canal-st-martin", title: "圣马丁运河", region: "巴黎", continent: "欧洲", types: ["景点"], visited: false,
    content: `适合沿河散步，坐在河边台阶上喝咖啡看巴黎人的日常生活，周边有不少小众买手店和咖啡馆，是《天使爱美丽》的取景地之一。` },
  { id: "paris-enfants-rouges", title: "红孩儿市场 Marché des Enfants Rouges", region: "巴黎", continent: "欧洲", types: ["美食"], visited: false,
    content: `巴黎最古老的有盖市场之一，摊位聚集多国美食（摩洛哥、日本、意大利等），适合当作午餐目的地，找个摊位坐下来吃。` },
  { id: "paris-pere-lachaise", title: "拉雪兹神父公墓", region: "巴黎", continent: "欧洲", types: ["景点"], visited: false,
    content: `欧洲最大的公墓之一，肖邦、王尔德、吉姆·莫里森等名人安葬于此，氛围宁静，适合喜欢安静人文散步的人。` },

  // ------------------------- 罗马 Rome -------------------------
  { id: "rome-trastevere", title: "特拉斯泰韦莱区 Trastevere", region: "罗马", continent: "欧洲", types: ["景点"], visited: false,
    content: `罗马最有生活气息的老城区，晚上有很多小酒馆和本地餐厅，石板路和爬满藤蔓的老房子很好拍，比市中心游客区更悠闲。` },
  { id: "rome-colosseum", title: "斗兽场 + 古罗马广场", region: "罗马", continent: "欧洲", types: ["景点"], visited: false,
    content: `建议提前网上订票避开现场排队，古罗马广场的遗址群往往比斗兽场本身更值得花时间细逛，建议预留半天时间。` },
  { id: "rome-carciofi", title: "罗马式犹太朝鲜蓟", region: "罗马", continent: "欧洲", types: ["美食"], visited: false,
    content: `罗马犹太区（Ghetto Ebraico）的特色菜Carciofi alla Giudia，春季是最佳时令，酥炸整颗朝鲜蓟外酥里嫩，值得专门去尝。` },
  { id: "rome-giardino-aranci", title: "橙树花园 + 骑士团之孔", region: "罗马", continent: "欧洲", types: ["景点"], visited: false,
    content: `从橙树花园（Giardino degli Aranci）可以看到罗马全景，附近的骑士团锁孔（Buco della Serratura）透过钥匙孔能看到远处的梵蒂冈圆顶，是很经典的机位。` },
  { id: "rome-tiber-summer", title: "台伯河沿岸夏季夜市", region: "罗马", continent: "欧洲", types: ["景点"], visited: false,
    content: `罗马夏天沿台伯河会搭建临时夜市和露天酒吧（Lungo il Tevere），适合傍晚闲逛、吃点小吃喝杯酒，只在夏季限定开放。` },
  { id: "rome-testaccio", title: "泰斯塔乔市场 + 罗马四大经典面食", region: "罗马", continent: "欧洲", types: ["美食"], visited: false,
    content: `比市中心游客区更本地化的美食区，Carbonara、Cacio e Pepe、Amatriciana、Gricia这罗马四大经典面食在这一带的老店能吃到地道版本。` },
  { id: "rome-vatican-museum", title: "梵蒂冈博物馆", region: "罗马", continent: "欧洲", types: ["景点"], visited: false,
    content: `建议选清晨开门第一批入场或晚间开放场次，人流相对较少，西斯廷教堂内不可拍照需注意，参观时间建议预留至少半天。` },

  // ------------------------- 巴塞罗那 Barcelona -------------------------
  { id: "barcelona-gaudi", title: "高迪建筑群（圣家堂/奎尔公园/巴特罗之家）", region: "巴塞罗那", continent: "欧洲", types: ["景点"], visited: false,
    content: `建议提前网上订票，圣家堂内部光线在下午最美（彩色玻璃折射），三处建筑风格各不相同，适合安排完整一天细看。` },
  { id: "barcelona-gothic", title: "哥特区 + 波恩区", region: "巴塞罗那", continent: "欧洲", types: ["景点"], visited: false,
    content: `中世纪窄巷交错，适合没有目的地地迷路式漫步，晚上灯光亮起后氛围尤其好，波恩区（El Born）内也有不少设计感很强的小店。` },
  { id: "barcelona-boqueria", title: "博盖利亚市场 La Boqueria", region: "巴塞罗那", continent: "欧洲", types: ["美食"], visited: false,
    content: `兰布拉大道旁的传统市场，适合尝各种伊比利亚火腿、新鲜海鲜和现榨果汁小吃，建议避开正午最拥挤的时段。` },
  { id: "barcelona-bunkers", title: "移山公园 Bunkers del Carmel", region: "巴塞罗那", continent: "欧洲", types: ["景点"], visited: false,
    content: `本地人才熟悉的免费日落观景点，前身是内战时期的防空炮台遗址，能看到全巴塞罗那城区和地中海，适合傍晚带瓶饮料上去坐着看日落。` },
  { id: "barcelona-tapas", title: "巴塞罗那塔帕斯酒吧巡礼", region: "巴塞罗那", continent: "欧洲", types: ["美食"], visited: false,
    content: `El Born区或Gràcia区适合晚上串几家小酒馆，每家点几样tapas配一杯Vermut或者当地啤酒，是体验西班牙式社交晚餐的经典方式。` },
  { id: "barcelona-montjuic", title: "蒙特惠奇山 Montjuïc", region: "巴塞罗那", continent: "欧洲", types: ["徒步"], visited: false,
    content: `可以缆车上山也可以徒步上下，山上有城堡遗址、奥运场馆和大片花园，视野可以俯瞰整个港口和城区。` },
  { id: "barcelona-gracia", title: "Gràcia 区", region: "巴塞罗那", continent: "欧洲", types: ["景点"], visited: false,
    content: `巴塞罗那最有本地生活气息的街区之一，小广场和独立咖啡馆密集，游客比市中心少很多，很适合悠闲逛一下午。` },

  // ------------------------- 伦敦 London -------------------------
  { id: "london-portobello", title: "波多贝罗市集 Portobello Road", region: "伦敦", continent: "欧洲", types: ["景点"], visited: false,
    content: `诺丁山的周末古董市集，五颜六色的联排别墅也很适合拍照，建议周六上午去，市集氛围最热闹。` },
  { id: "london-hampstead", title: "汉普斯特德荒野 Hampstead Heath", region: "伦敦", continent: "欧洲", types: ["徒步"], visited: false,
    content: `伦敦最大的自然公园之一，Parliament Hill山丘可以俯瞰整个伦敦天际线，游客比摄政公园或海德公园少很多，适合悠闲散步。` },
  { id: "london-borough-market", title: "博罗市场 Borough Market", region: "伦敦", continent: "欧洲", types: ["美食"], visited: false,
    content: `伦敦最著名的美食市场，各国美食摊位密集，适合当作午餐目的地，紧邻泰晤士河和伦敦桥，逛完可以顺路沿河散步。` },
  { id: "london-regents-canal", title: "摄政运河步道", region: "伦敦", continent: "欧洲", types: ["徒步"], visited: false,
    content: `从Camden Market沿运河一路走到小威尼斯（Little Venice），沿途能看到河船社区和绿树成荫的运河景观，适合悠闲的City walk。` },
  { id: "london-british-library", title: "大英图书馆 + 国王十字车站周边", region: "伦敦", continent: "欧洲", types: ["景点"], visited: false,
    content: `比大英博物馆小众很多，馆藏珍贵手稿和历史文献，免费参观，周边国王十字车站一带近年也有不少新开的餐厅和商业空间。` },
  { id: "london-brick-lane", title: "布里克巷 Brick Lane", region: "伦敦", continent: "欧洲", types: ["美食"], visited: false,
    content: `伦敦孟加拉咖喱一条街，周日还有市集和涂鸦街拍照点，是东伦敦最有活力的移民文化街区之一。` },
  { id: "london-greenwich", title: "格林尼治公园 + 皇家天文台", region: "伦敦", continent: "欧洲", types: ["景点"], visited: false,
    content: `本初子午线打卡地，公园地势较高，可以眺望对岸金丝雀码头的现代天际线，晴天很适合带野餐垫过去坐坐。` },

  // ------------------------- 阿姆斯特丹 Amsterdam -------------------------
  { id: "amsterdam-jordaan", title: "约旦区 Jordaan", region: "阿姆斯特丹", continent: "欧洲", types: ["景点"], visited: false,
    content: `安静的运河街区，本地独立咖啡馆和小型艺术画廊密集，比市中心游客区悠闲很多，适合租辆自行车慢慢逛。` },
  { id: "amsterdam-van-gogh", title: "梵高博物馆 + 市立博物馆", region: "阿姆斯特丹", continent: "欧洲", types: ["景点"], visited: false,
    content: `建议提前网上订票，两个博物馆挨在一起、可以安排在同一天，博物馆广场（Museumplein）本身也很适合散步和野餐。` },
  { id: "amsterdam-haring", title: "生腌鲱鱼 Haring 摊位", region: "阿姆斯特丹", continent: "欧洲", types: ["美食"], visited: false,
    content: `荷兰国民小吃，运河边常见的小摊位上可以吃到传统做法——配洋葱碎和酸黄瓜，直接用手拎着鱼尾吃是本地人的经典吃法。` },
  { id: "amsterdam-giethoorn", title: "羊角村 Giethoorn", region: "阿姆斯特丹", continent: "欧洲", types: ["景点"], visited: false,
    content: `阿姆斯特丹近郊的"荷兰威尼斯"，村内没有公路、以水道和小桥连接，适合安排当天来回的水乡小镇一日游，可以租小船自己划。` },
  { id: "amsterdam-cycling", title: "阿姆斯特丹自行车City Walk", region: "阿姆斯特丹", continent: "欧洲", types: ["骑行"], visited: false,
    content: `租一辆自行车沿运河骑行是体验这座城市最地道的方式，市内自行车道系统很完善，但要注意遵守当地自行车路权规则。` },
  { id: "amsterdam-nine-streets", title: "九街 Nine Streets", region: "阿姆斯特丹", continent: "欧洲", types: ["景点"], visited: false,
    content: `运河区内的精品店+咖啡馆街区，九条小街纵横交错，适合悠闲购物和拍照，风格比市中心商业区更有设计感。` },
  { id: "amsterdam-zaanse-schans", title: "桑斯安斯风车村", region: "阿姆斯特丹", continent: "欧洲", types: ["景点"], visited: false,
    content: `保留荷兰传统风车和绿色木屋的露天博物馆村，离市区不远，适合半天往返，可以顺便参观奶酪和木鞋作坊。` },

  // ------------------------- 伊斯坦布尔 Istanbul -------------------------
  { id: "istanbul-balat", title: "巴拉特 + 费内尔老城区", region: "伊斯坦布尔", continent: "欧洲", types: ["景点"], visited: false,
    content: `彩色老房子聚集的老犹太/希腊社区，比苏丹艾哈迈德区更有生活气息，坡道上的彩色台阶是很受欢迎的拍照点。` },
  { id: "istanbul-suleymaniye", title: "苏莱曼尼耶清真寺", region: "伊斯坦布尔", continent: "欧洲", types: ["景点"], visited: false,
    content: `比蓝色清真寺游客少很多，建筑本身出自建筑大师锡南之手，寺内视野可以俯瞰金角湾，是更安静的替代选择。` },
  { id: "istanbul-kadikoy", title: "卡德柯伊 Kadıköy 亚洲区市场", region: "伊斯坦布尔", continent: "欧洲", types: ["美食"], visited: false,
    content: `伊斯坦布尔亚洲一侧的本地市场和街区，美食比欧洲区游客聚集地更地道也更便宜，很适合体验本地人的日常生活节奏。` },
  { id: "istanbul-bosphorus", title: "博斯普鲁斯海峡游船", region: "伊斯坦布尔", continent: "欧洲", types: ["景点"], visited: false,
    content: `跨越欧亚两岸的经典体验，黄昏时段光线最好，两岸的清真寺、古堡和现代建筑交错而过，是了解这座城市地理格局最直观的方式。` },
  { id: "istanbul-baklava", title: "土耳其烤肉 + Baklava 甜点老铺", region: "伊斯坦布尔", continent: "欧洲", types: ["美食"], visited: false,
    content: `老城区有不少百年历史的甜品店，酥皮蜜糖坚果甜点Baklava配土耳其红茶是经典下午茶组合，甜度较高建议配无糖茶饮用。` },
  { id: "istanbul-galata", title: "加拉塔塔 + 周边街区", region: "伊斯坦布尔", continent: "欧洲", types: ["景点"], visited: false,
    content: `可以俯瞰金角湾全景，塔周边街道有很多独立咖啡馆和唱片店，是伊斯坦布尔比较文艺小资的一片区域。` },
  { id: "istanbul-bazaar", title: "大巴扎 + 香料市场", region: "伊斯坦布尔", continent: "欧洲", types: ["景点"], visited: false,
    content: `两个市场风格不同——大巴扎以纺织品和工艺品为主，香料市场以食品香料和土耳其软糖为主，购物时建议货比三家并准备好砍价。` },

  // ------------------------- 布拉格 Prague -------------------------
  { id: "prague-charles-bridge", title: "查理大桥 + 旧城广场", region: "布拉格", continent: "欧洲", types: ["景点"], visited: false,
    content: `建议清晨6-7点前往查理大桥，几乎没有游客、光线也最好，白天桥上会非常拥挤，画家和街头艺人也大多在白天出摊。` },
  { id: "prague-mala-strana", title: "小城区 Malá Strana", region: "布拉格", continent: "欧洲", types: ["景点"], visited: false,
    content: `布拉格城堡下方的老城区，巷弄安静适合漫步，游客比旧城广场少，沿途有不少小型花园和历史建筑值得慢慢逛。` },
  { id: "prague-beer-hall", title: "传统啤酒馆", region: "布拉格", continent: "欧洲", types: ["美食"], visited: false,
    content: `布拉格是啤酒文化重镇，传统烤猪肘配黑啤是经典组合，U Fleků这类老牌酒馆有自家酿造的啤酒和上百年历史。` },
  { id: "prague-petrin", title: "佩特任山 Petřín", region: "布拉格", continent: "欧洲", types: ["景点"], visited: false,
    content: `可以爬山也可以坐缆车上去，山顶有一座迷你版埃菲尔铁塔造型的瞭望塔，能俯瞰布拉格全城，日落时段景色尤其好。` },
  { id: "prague-josefov", title: "犹太区 Josefov", region: "布拉格", continent: "欧洲", types: ["景点"], visited: false,
    content: `欧洲保存最完好的犹太历史街区之一，有多座历史悠久的犹太会堂和古老的犹太墓地，是了解欧洲犹太历史的重要一站。` },
  { id: "prague-astronomical-clock", title: "天文钟 + 提恩教堂", region: "布拉格", continent: "欧洲", types: ["景点"], visited: false,
    content: `旧城广场地标建筑，整点报时表演会吸引大量游客围观，建议提前几分钟找好观看位置，教堂内部也值得进去看看。` },
  { id: "prague-cesky-raj", title: "波希米亚天堂一日游", region: "布拉格", continent: "欧洲", types: ["徒步"], visited: false,
    content: `布拉格近郊的岩石地貌国家自然公园（Český ráj），奇特的砂岩地貌和森林步道很适合安排一日徒步，游客比市区景点少很多。` },

  // ------------------------- 纽约 New York -------------------------
  { id: "nyc-highline", title: "高线公园 High Line", region: "纽约", continent: "北美洲", types: ["景点"], visited: false,
    content: `曼哈顿老铁路改建的空中步道，沿途能看到哈德逊河和城市天际线，串联了切尔西市场等多个热门区域，适合安排一段City walk。` },
  { id: "nyc-dumbo", title: "布鲁克林 DUMBO 区", region: "纽约", continent: "北美洲", types: ["景点"], visited: false,
    content: `可以拍到经典的曼哈顿大桥框景照片（Washington St机位），附近有很多独立咖啡馆和书店，适合安排半天悠闲逛街。` },
  { id: "nyc-chelsea-market", title: "切尔西市场 Chelsea Market", region: "纽约", continent: "北美洲", types: ["美食"], visited: false,
    content: `老工厂改建的室内美食市场，摊位选择丰富，紧邻高线公园，适合逛完高线公园顺路解决一餐。` },
  { id: "nyc-brooklyn-heights", title: "布鲁克林高地漫步长廊", region: "纽约", continent: "北美洲", types: ["景点"], visited: false,
    content: `欣赏曼哈顿天际线的本地人观景点，游客比对岸的炮台公园或高线公园少，日落时分光线尤其好。` },
  { id: "nyc-flushing", title: "法拉盛中华美食区", region: "纽约", continent: "北美洲", types: ["美食"], visited: false,
    content: `纽约最地道的中餐/亚洲美食聚集地之一，比曼哈顿唐人街选择更丰富、价格也更亲民，适合喜欢正宗中餐的人专程去一趟。` },
  { id: "nyc-central-park-north", title: "中央公园北部（哈莱姆湖周边）", region: "纽约", continent: "北美洲", types: ["景点"], visited: false,
    content: `比公园南部游客少很多，适合悠闲散步或野餐，能感受到更贴近本地人日常的中央公园使用方式。` },
  { id: "nyc-moma", title: "现代艺术博物馆 MoMA", region: "纽约", continent: "北美洲", types: ["景点"], visited: false,
    content: `馆藏从印象派到当代艺术都有，梵高《星夜》等名作都在这里，建议错峰时间前往并提前订票，周边第五大道也适合顺路逛逛。` },

  // ------------------------- 墨西哥城 Mexico City -------------------------
  { id: "mexicocity-roma-condesa", title: "罗马区/孔德萨区 Roma/Condesa", region: "墨西哥城", continent: "北美洲", types: ["景点"], visited: false,
    content: `绿树成荫的Art Deco风格街区，独立咖啡馆和设计师小店密集，是墨西哥城文艺青年聚集地，适合悠闲逛一整个下午。` },
  { id: "mexicocity-xochimilco", title: "索奇米尔科运河 Xochimilco", region: "墨西哥城", continent: "北美洲", types: ["景点"], visited: false,
    content: `乘坐彩色平底船（trajinera）游览阿兹特克时期留下的水上运河系统，周末常有载着乐队的游船，氛围很热闹，适合和朋友结伴体验。` },
  { id: "mexicocity-tacos", title: "街头塔可 Tacos al Pastor", region: "墨西哥城", continent: "北美洲", types: ["美食"], visited: false,
    content: `墨西哥城的国民小吃，源自黎巴嫩移民带来的烤肉技法，建议找排队人多的路边摊，通常是判断好不好吃最直接的标准。` },
  { id: "mexicocity-anthropology", title: "人类学博物馆", region: "墨西哥城", continent: "北美洲", types: ["景点"], visited: false,
    content: `拉美最重要的博物馆之一，馆藏阿兹特克太阳石等前哥伦布文明文物，展馆很大建议预留至少半天时间细看。` },
  { id: "mexicocity-teotihuacan", title: "特奥蒂瓦坎金字塔", region: "墨西哥城", continent: "北美洲", types: ["景点"], visited: false,
    content: `市郊一日游经典目的地，可以爬上太阳金字塔和月亮金字塔俯瞰整个遗址群，建议早上出发避开正午高温。` },
  { id: "mexicocity-mercado", title: "本地美食市集", region: "墨西哥城", continent: "北美洲", types: ["美食"], visited: false,
    content: `比游客区更本地化的美食集市（如Mercado Roma一类），适合一次尝试多种地方小吃，价格也比餐厅实惠。` },
  { id: "mexicocity-frida", title: "弗里达·卡罗博物馆（蓝房子）", region: "墨西哥城", continent: "北美洲", types: ["景点"], visited: false,
    content: `位于科约阿坎区（Coyoacán），建议提前网上订票避免现场排队，周边街区本身很有生活气息，也值得安排时间逛逛。` },

  // ------------------------- 马拉喀什 Marrakech -------------------------
  { id: "marrakech-jemaa", title: "德吉玛广场 Jemaa el-Fna", region: "马拉喀什", continent: "非洲", types: ["景点"], visited: false,
    content: `白天是普通市集，傍晚会变身大型露天美食广场加街头表演现场，是马拉喀什最具代表性的体验，建议傍晚去感受最热闹的氛围。` },
  { id: "marrakech-majorelle", title: "马若雷勒花园 Jardin Majorelle", region: "马拉喀什", continent: "非洲", types: ["景点"], visited: false,
    content: `曾属于设计师伊夫·圣罗兰的花园，标志性的靛蓝色建筑配仙人掌植物园很好拍，建议避开正午人流高峰时段前往。` },
  { id: "marrakech-tagine", title: "麦地那老城传统塔吉锅", region: "马拉喀什", continent: "非洲", types: ["美食"], visited: false,
    content: `建议在当地人推荐的小餐馆吃塔吉锅（Tagine），比游客集中区域的餐厅性价比高很多，牛肉/鸡肉配果干口味都值得一试。` },
  { id: "marrakech-bahia", title: "巴西亚宫 Bahia Palace", region: "马拉喀什", continent: "非洲", types: ["景点"], visited: false,
    content: `精美的摩尔式建筑和瓷砖装饰，游客相对分散，拍照体验比德吉玛广场周边景点更从容。` },
  { id: "marrakech-souks", title: "麦地那巷弄 + 染坊区 Souk Teinturiers", region: "马拉喀什", continent: "非洲", types: ["景点"], visited: false,
    content: `可以看到传统皮革和织物染色工艺，色彩斑斓的染缸很出片，讨价还价是这里购物的常态，建议货比三家再下手。` },
  { id: "marrakech-atlas", title: "阿特拉斯山脉一日游（Imlil村）", region: "马拉喀什", continent: "非洲", types: ["徒步"], visited: false,
    content: `从马拉喀什出发可以到柏柏尔人村庄徒步，感受雪山脚下的柏柏尔文化和传统生活方式，适合喜欢山地徒步的人安排一天。` },
  { id: "marrakech-badi", title: "巴迪皇宫遗址 El Badi Palace", region: "马拉喀什", continent: "非洲", types: ["景点"], visited: false,
    content: `如今是废墟状态但很有历史沧桑感，鹳鸟经常在残存的城墙上筑巢，游客比其他宫殿类景点少很多。` },

  // ------------------------- 开普敦 Cape Town -------------------------
  { id: "capetown-table-mountain", title: "桌山 Table Mountain", region: "开普敦", continent: "非洲", types: ["景点", "徒步"], visited: false,
    content: `可以坐缆车上去也可以徒步（Platteklip Gorge是经典路线），天气好时能看到整个开普半岛，缆车会因大风临时停运，建议留出备选时间。` },
  { id: "capetown-bokaap", title: "布欧卡普彩色房子区 Bo-Kaap", region: "开普敦", continent: "非洲", types: ["景点"], visited: false,
    content: `色彩缤纷的开普马来文化街区，是拍照打卡热门地，但这里是真实的居民社区，建议尊重当地居民、不要随意进入私人区域或打扰住户。` },
  { id: "capetown-cape-point", title: "好望角 + 企鹅滩 Boulders Beach", region: "开普敦", continent: "非洲", types: ["景点"], visited: false,
    content: `开普半岛一日游经典组合，企鹅滩可以近距离看到非洲企鹅（保持安全距离，不要触摸），好望角本身视野壮阔适合安排半天。` },
  { id: "capetown-bree-kloof", title: "Bree Street/Kloof Street 餐厅区", region: "开普敦", continent: "非洲", types: ["美食"], visited: false,
    content: `开普敦最新潮的餐厅酒吧聚集街区，适合品尝南非当代融合菜和精酿啤酒，晚上气氛也很热闹。` },
  { id: "capetown-constantia", title: "康斯坦提亚酒庄区", region: "开普敦", continent: "非洲", types: ["景点"], visited: false,
    content: `开普敦市区内就能到达的葡萄酒产区，多个酒庄提供品酒和庄园餐厅，适合安排半天悠闲的品酒行程。` },
  { id: "capetown-lions-head", title: "狮头山 Lion's Head", region: "开普敦", continent: "非洲", types: ["徒步"], visited: false,
    content: `满月之夜很多本地人会带头灯集体夜爬，是开普敦本地人的经典夜生活活动之一，山顶可以看日出或日落，视野覆盖整个城市和海岸线。` },
  { id: "capetown-robben-island", title: "罗宾岛 Robben Island", region: "开普敦", continent: "非洲", types: ["景点"], visited: false,
    content: `曼德拉曾被囚禁27年的监狱岛，需提前预约渡轮加导览行程，是了解南非种族隔离历史绕不开的重要一站。` },

  // ------------------------- 墨尔本 Melbourne -------------------------
  { id: "melbourne-laneways", title: "中央商务区涂鸦巷（Hosier Lane等）", region: "墨尔本", continent: "大洋洲", types: ["景点"], visited: false,
    content: `墨尔本街头艺术文化的代表，巷子里的涂鸦经常更新替换，每次去看到的画面都不太一样，附近小巷子里也藏着不少精品咖啡馆。` },
  { id: "melbourne-coffee", title: "墨尔本咖啡文化 City Walk", region: "墨尔本", continent: "大洋洲", types: ["美食"], visited: false,
    content: `墨尔本被认为是澳洲咖啡文化的发源地，市区巷弄里藏着大量独立咖啡馆，整体咖啡场景比悉尼更密集也更多元，适合安排一场咖啡馆巡礼。` },
  { id: "melbourne-botanic-yarra", title: "皇家植物园 + 雅拉河畔", region: "墨尔本", continent: "大洋洲", types: ["景点"], visited: false,
    content: `比悉尼皇家植物园面积更大，适合野餐和沿雅拉河散步，天气好的周末本地人会带着毯子和野餐篮来这里度过一整个下午。` },
  { id: "melbourne-queen-vic-market", title: "维多利亚女王市场", region: "墨尔本", continent: "大洋洲", types: ["美食"], visited: false,
    content: `墨尔本最大的露天市场，周三晚上有夜市（Night Market），各国美食摊位加live music，是很受本地人欢迎的周中活动。` },
  { id: "melbourne-stkilda", title: "圣科达海滩 + 企鹅归巢", region: "墨尔本", continent: "大洋洲", types: ["景点"], visited: false,
    content: `黄昏时段可以在防波堤（St Kilda Pier）看到野生小企鹅归巢，是本地人也会专程去看的活动，建议保持安静、不要用闪光灯打扰企鹅。` },
  { id: "melbourne-fitzroy", title: "布朗瑞维克/菲茨罗伊区", region: "墨尔本", continent: "大洋洲", types: ["景点"], visited: false,
    content: `墨尔本最有文艺气息的社区之一，古着店、livehouse和小众餐厅聚集，适合喜欢慢节奏City walk和淘古着的人。` },
  { id: "melbourne-great-ocean-road", title: "大洋路一日游", region: "墨尔本", continent: "大洋洲", types: ["骑行", "徒步"], visited: false,
    content: `从墨尔本出发的经典自驾/跟团路线，十二门徒岩是必经打卡点，建议避开正午强光时段拍照，日出或日落光线会更出片。` },

  // ------------------------- 悉尼非City部分补充 -------------------------
  { id: "sydney-shelly-beach", title: "Shelly Beach 浮潜（曼利附近）", region: "悉尼NSW", continent: "大洋洲", types: ["景点"], visited: false,
    content: `曼利附近一处很受欢迎的浮潜海湾，水域平静清澈，站在及腰深的地方就能看到大蓝魔鬼鱼、乌贼、海龟和叶海龙，是悉尼北区最容易上手的浮潜点之一，自带浮潜镜即可下水。` },
  { id: "sydney-spit-manly-walk", title: "Spit Bridge to Manly Walk", region: "悉尼NSW", continent: "大洋洲", types: ["徒步"], visited: false,
    content: `一条约10公里的海岸徒步道，从Spit Bridge一路走到曼利，沿途经过沙滩、原住民历史遗迹和多个观景台，难度不算高，适合安排半天，很多本地人会单程走完再坐渡轮回城。` },

const FAV_KEY = "explore-list-favs";
const SAVED_KEY = "explore-list-saved-to-ob";
const CHECKIN_KEY = "explore-list-checkedin";

function loadCheckedIn() {
  const stored = localStorage.getItem(CHECKIN_KEY);
  if (stored) return new Set(JSON.parse(stored));
  // 首次加载时，把原始笔记里已标注"去过"的地方也算作已打卡
  return new Set(PLACES.filter((p) => p.visited).map((p) => p.id));
}

const state = {
  search: "",
  continent: "all",
  type: "all",
  favOnly: false,
  favs: new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")),
  savedToOb: new Set(JSON.parse(localStorage.getItem(SAVED_KEY) || "[]")),
  checkedIn: loadCheckedIn(),
  expanded: new Set(),
  lastSuggested: null,
};

const els = {
  search: document.getElementById("search-input"),
  continentFilters: document.getElementById("continent-filters"),
  typeFilters: document.getElementById("type-filters"),
  favOnly: document.getElementById("fav-only"),
  list: document.getElementById("list"),
  resultsCount: document.getElementById("results-count"),
  discoverBtn: document.getElementById("discover-btn"),
  discoverResult: document.getElementById("discover-result"),
};

function saveFavs() {
  localStorage.setItem(FAV_KEY, JSON.stringify([...state.favs]));
}
function saveSavedToOb() {
  localStorage.setItem(SAVED_KEY, JSON.stringify([...state.savedToOb]));
}
function saveCheckedIn() {
  localStorage.setItem(CHECKIN_KEY, JSON.stringify([...state.checkedIn]));
}

const wikiImageCache = {};

async function fetchWikiImageFrom(lang, query) {
  const cacheKey = lang + ":" + query;
  if (cacheKey in wikiImageCache) return wikiImageCache[cacheKey];
  try {
    const api =
      `https://${lang}.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=` +
      encodeURIComponent(query) +
      "&gsrlimit=1&prop=pageimages|info&inprop=url&piprop=thumbnail&pithumbsize=640&format=json&origin=*";
    const res = await fetch(api);
    const data = await res.json();
    const pages = data.query && data.query.pages;
    const page = pages ? Object.values(pages)[0] : null;
    const result = page && page.thumbnail
      ? { src: page.thumbnail.source, title: page.title, url: page.fullurl }
      : null;
    wikiImageCache[cacheKey] = result;
    return result;
  } catch (e) {
    wikiImageCache[cacheKey] = null;
    return null;
  }
}

async function fetchWikiImage(place) {
  // 先用中文标题在中文维基搜，找不到再退回用英文地区名在英文维基搜一张城市/地标图
  const zh = await fetchWikiImageFrom("zh", place.title);
  if (zh) return zh;
  const enQuery = REGION_ENGLISH[place.region];
  if (enQuery) {
    const en = await fetchWikiImageFrom("en", enQuery + " " + place.title.replace(/[^\x00-\x7F]/g, "").trim());
    if (en) return en;
    return fetchWikiImageFrom("en", enQuery);
  }
  return null;
}

// 标题带这些字眼的通常是"多个地方/多篇内容打包"型合集，维基百科搜不到对应词条，
// 搜索容易匹配到风马牛不相及的结果，宁可不配图也不要配错图
const NO_IMAGE_TITLE_MARKERS = [
  "合集", "三件套", "攻略", "建议", "划区", "尝鲜", "打卡地点", "路线",
  "清单", "联游", "四国", "推荐", "实测", "巡礼", "美食清单", "系列",
];

function shouldSkipImage(place) {
  return NO_IMAGE_TITLE_MARKERS.some((k) => place.title.includes(k));
}

function attachWikiImage(container, place) {
  if (!container) return;
  if (shouldSkipImage(place)) {
    container.remove();
    return;
  }
  fetchWikiImage(place).then((img) => {
    if (!container.isConnected) return;
    if (!img) {
      container.remove();
      return;
    }
    container.classList.add("loaded");
    container.innerHTML = `
      <img src="${img.src}" alt="${place.title}" loading="lazy" />
      <a class="img-caption" href="${img.url}" target="_blank" rel="noopener">📷 图片来自维基百科 · ${img.title}</a>
    `;
  });
}

function buildFilterChips() {
  const continents = [...new Set(PLACES.map((p) => p.continent))];
  for (const c of continents) {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.continent = c;
    btn.textContent = c;
    els.continentFilters.appendChild(btn);
  }
  els.continentFilters.addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    state.continent = btn.dataset.continent;
    [...els.continentFilters.querySelectorAll(".chip")].forEach((c) =>
      c.classList.toggle("active", c === btn)
    );
    render();
  });

  const types = [...new Set(PLACES.flatMap((p) => p.types))];
  for (const t of types) {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.type = t;
    btn.textContent = t;
    els.typeFilters.appendChild(btn);
  }
  els.typeFilters.addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    state.type = btn.dataset.type;
    [...els.typeFilters.querySelectorAll(".chip")].forEach((c) =>
      c.classList.toggle("active", c === btn)
    );
    render();
  });
}

function getFiltered() {
  const q = state.search.trim().toLowerCase();
  const matched = PLACES.filter((p) => {
    const matchContinent = state.continent === "all" || p.continent === state.continent;
    const matchType = state.type === "all" || p.types.includes(state.type);
    const matchFav = !state.favOnly || state.favs.has(p.id);
    const haystack = (p.title + " " + p.region + " " + p.content).toLowerCase();
    const matchSearch = !q || haystack.includes(q);
    return matchContinent && matchType && matchFav && matchSearch;
  });
  // 已打卡的地方不用优先出现，往后排（各自内部保持原顺序）
  const notCheckedIn = matched.filter((p) => !state.checkedIn.has(p.id));
  const checkedIn = matched.filter((p) => state.checkedIn.has(p.id));
  return [...notCheckedIn, ...checkedIn];
}

function buildObsidianUri(place) {
  const lines = [
    `# ${place.title}`,
    "",
    `- 地区：${place.region}`,
    `- 类型：${place.types.join("、")}`,
    "",
    place.content,
    "",
    "> 收藏自「我的探索清单」网页",
  ];
  const content = lines.join("\n");
  const path = `${OBSIDIAN_FOLDER}/${place.title}`;
  return (
    "obsidian://new?vault=" +
    encodeURIComponent(OBSIDIAN_VAULT) +
    "&name=" +
    encodeURIComponent(path) +
    "&content=" +
    encodeURIComponent(content)
  );
}

function renderCard(place) {
  const isFav = state.favs.has(place.id);
  const isSaved = state.savedToOb.has(place.id);
  const isExpanded = state.expanded.has(place.id);
  const isCheckedIn = state.checkedIn.has(place.id);
  const isLong = place.content.length > 140;
  const country = REGION_COUNTRY[place.region];

  const card = document.createElement("div");
  card.className = "card";

  const typeTags = place.types.map((t) => `<span class="tag">${t}</span>`).join("");

  card.innerHTML = `
    <div class="card-head">
      <h2>${place.title}</h2>
    </div>
    <div class="card-tags">
      <span class="tag region">📍 ${place.region}${country ? " · " + country : ""}</span>
      ${typeTags}
      ${isCheckedIn ? '<span class="tag checked-in-badge">✓ 已打卡</span>' : ""}
      ${place.isResource ? '<span class="tag resource">🧰 资源</span>' : ""}
    </div>
    <div class="card-preview ${isLong && !isExpanded ? "collapsed" : ""}" id="preview-${place.id}">${place.content}</div>
    ${isLong ? `<button class="expand-btn" id="expand-${place.id}">${isExpanded ? "收起 ▲" : "展开全文 ▼"}</button>` : ""}
    <div class="wiki-img" id="img-${place.id}"></div>
    <div class="card-actions">
      <button class="action-btn fav ${isFav ? "active" : ""}" id="fav-${place.id}">
        ${isFav ? "💛 已收藏" : "🤍 收藏"}
      </button>
      <button class="action-btn checkin ${isCheckedIn ? "active" : ""}" id="checkin-${place.id}">
        ${isCheckedIn ? "✓ 已打卡" : "📍 标记打卡"}
      </button>
      <button class="action-btn ${isSaved ? "saved" : ""}" id="save-ob-${place.id}">
        ${isSaved ? "✓ 已存 Obsidian" : "📥 存到 Obsidian"}
      </button>
    </div>
  `;

  if (isLong) {
    card.querySelector(`#expand-${place.id}`).addEventListener("click", () => {
      if (state.expanded.has(place.id)) {
        state.expanded.delete(place.id);
      } else {
        state.expanded.add(place.id);
      }
      render();
    });
  }

  card.querySelector(`#fav-${place.id}`).addEventListener("click", () => {
    if (state.favs.has(place.id)) {
      state.favs.delete(place.id);
    } else {
      state.favs.add(place.id);
    }
    saveFavs();
    render();
  });

  card.querySelector(`#checkin-${place.id}`).addEventListener("click", () => {
    if (state.checkedIn.has(place.id)) {
      state.checkedIn.delete(place.id);
    } else {
      state.checkedIn.add(place.id);
    }
    saveCheckedIn();
    render();
  });

  card.querySelector(`#save-ob-${place.id}`).addEventListener("click", () => {
    window.location.href = buildObsidianUri(place);
    state.savedToOb.add(place.id);
    saveSavedToOb();
    render();
  });

  attachWikiImage(card.querySelector(`#img-${place.id}`), place);

  return card;
}

function render() {
  const filtered = getFiltered();
  els.resultsCount.textContent = `共 ${filtered.length} 个 · 已收藏 ${state.favs.size} · 已打卡 ${state.checkedIn.size}`;
  els.list.innerHTML = "";
  if (filtered.length === 0) {
    els.list.innerHTML = `<div class="empty-state">没有找到匹配的地方，换个关键词或筛选条件试试</div>`;
    return;
  }
  for (const place of filtered) {
    els.list.appendChild(renderCard(place));
  }
}

let searchDebounce = null;
els.search.addEventListener("input", (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.search = e.target.value;
    render();
  }, 150);
});

els.favOnly.addEventListener("change", (e) => {
  state.favOnly = e.target.checked;
  render();
});

const coveredRegions = new Set(PLACES.map((p) => p.region));
els.discoverBtn.addEventListener("click", () => {
  let pool = CANDIDATE_CITIES.filter((c) => !coveredRegions.has(c.name));
  if (pool.length > 1 && state.lastSuggested) {
    pool = pool.filter((c) => c.name !== state.lastSuggested);
  }
  if (pool.length === 0) {
    els.discoverResult.innerHTML = `候选城市库已经被你逛得差不多啦，可以直接跟我说想去哪个新地方，我来帮你查～`;
    els.discoverResult.classList.add("show");
    return;
  }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.lastSuggested = pick.name;
  els.discoverResult.innerHTML = `
    还没收录：<span class="discover-city">${pick.name}</span>（${pick.continent}）<br>
    回来跟我说"帮我加上${pick.name}"，我就会去搜集内容加进来 🙌
  `;
  els.discoverResult.classList.add("show");
});

buildFilterChips();
render();
</script>
